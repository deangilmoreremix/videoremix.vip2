<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" 
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-ai-referral-maximizer-pro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d2a4a"/>
    </linearGradient>
    <radialGradient id="glow-ai-referral-maximizer-pro" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <filter id="noise-ai-referral-maximizer-pro">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-ai-referral-maximizer-pro)"/>
  
  <!-- Grid pattern -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="600"/><line x1="40" y1="0" x2="40" y2="600"/><line x1="80" y1="0" x2="80" y2="600"/><line x1="120" y1="0" x2="120" y2="600"/><line x1="160" y1="0" x2="160" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/><line x1="240" y1="0" x2="240" y2="600"/><line x1="280" y1="0" x2="280" y2="600"/><line x1="320" y1="0" x2="320" y2="600"/><line x1="360" y1="0" x2="360" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/><line x1="440" y1="0" x2="440" y2="600"/><line x1="480" y1="0" x2="480" y2="600"/><line x1="520" y1="0" x2="520" y2="600"/><line x1="560" y1="0" x2="560" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/><line x1="640" y1="0" x2="640" y2="600"/><line x1="680" y1="0" x2="680" y2="600"/><line x1="720" y1="0" x2="720" y2="600"/><line x1="760" y1="0" x2="760" y2="600"/>
    <line x1="0" y1="0" x2="800" y2="0"/><line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="200" x2="800" y2="200"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="280" x2="800" y2="280"/><line x1="0" y1="320" x2="800" y2="320"/><line x1="0" y1="360" x2="800" y2="360"/><line x1="0" y1="400" x2="800" y2="400"/><line x1="0" y1="440" x2="800" y2="440"/><line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="520" x2="800" y2="520"/><line x1="0" y1="560" x2="800" y2="560"/>
  </g>
  
  <!-- Neural network decoration -->
  
    <g opacity="0.25">
      <circle cx="650" cy="120" r="30" fill="#7c3aed" opacity="0.3"/>
      <circle cx="600" cy="90" r="4" fill="#06b6d4"/>
      <circle cx="690" cy="80" r="3" fill="#06b6d4"/>
      <circle cx="620" cy="160" r="5" fill="#06b6d4"/>
      <circle cx="700" cy="150" r="4" fill="#06b6d4"/>
      <circle cx="650" cy="170" r="3" fill="#06b6d4"/>
      <line x1="600" y1="90" x2="690" y2="80" stroke="#7c3aed" stroke-width="1"/>
      <line x1="600" y1="90" x2="620" y2="160" stroke="#7c3aed" stroke-width="1"/>
      <line x1="690" y1="80" x2="700" y2="150" stroke="#7c3aed" stroke-width="1"/>
      <line x1="620" y1="160" x2="650" y2="170" stroke="#7c3aed" stroke-width="1"/>
      <line x1="700" y1="150" x2="650" y2="170" stroke="#7c3aed" stroke-width="1"/>
    </g>
  
  
  <!-- Glow effect -->
  <ellipse cx="400" cy="270" rx="150" ry="120" fill="url(#glow-ai-referral-maximizer-pro)"/>
  
  <!-- Corner accents -->
  <g stroke="#7c3aed" stroke-width="2" fill="none" opacity="0.4">
    <path d="M30,30 L80,30 L30,80"/>
    <path d="M770,30 L720,30 L770,80"/>
    <path d="M30,570 L80,570 L30,520"/>
    <path d="M770,570 L720,570 L770,520"/>
  </g>
  
  <!-- Icon -->
  <g transform="translate(400, 260) scale(1.2)">
    
      <g transform="translate(50, 50)">
        <line x1="0" y1="-25" x2="-25" y2="15" stroke="#7c3aed" stroke-width="2"/>
        <line x1="0" y1="-25" x2="25" y2="15" stroke="#7c3aed" stroke-width="2"/>
        <line x1="-25" y1="15" x2="0" y2="35" stroke="#7c3aed" stroke-width="2"/>
        <line x1="25" y1="15" x2="0" y2="35" stroke="#7c3aed" stroke-width="2"/>
        <circle cx="0" cy="-25" r="8" fill="#7c3aed"/>
        <circle cx="-25" cy="15" r="8" fill="#7c3aed"/>
        <circle cx="25" cy="15" r="8" fill="#7c3aed"/>
        <circle cx="0" cy="35" r="8" fill="#7c3aed"/>
      </g>
    
  </g>
  
  <!-- Bottom gradient overlay -->
  <rect x="0" y="460" width="800" height="140" fill="url(#bg-ai-referral-maximizer-pro)" opacity="0.85"/>
  <linearGradient id="textFade-ai-referral-maximizer-pro" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#1a1a2e"/>
  </linearGradient>
  <rect x="0" y="460" width="800" height="60" fill="url(#textFade-ai-referral-maximizer-pro)"/>
  
  <!-- App name -->
  <text x="400" y="530" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="28" 
        font-weight="600" 
        fill="white">AI Referral Maximizer Pro</text>
  
  <!-- Category label -->
  <text x="400" y="560" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        font-weight="400" 
        fill="#94a3b8" 
        letter-spacing="2">LEAD-GEN</text>
  
  <!-- Noise texture overlay (very subtle) -->
  <rect width="800" height="600" fill="rgba(255,255,255,0.01)" opacity="0.3"/>
</svg>