<?xml version="1.0" encoding="UTF-8"?>
<svg width="280" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgsales-monetizer" x1="145%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060606;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="glowsales-monetizer" cx="50%" cy="45%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:0.25" />
      <stop offset="40%" style="stop-color:#fb923c;stop-opacity:0.08" />
      <stop offset="70%" style="stop-color:#fb923c;stop-opacity:0" />
    </radialGradient>

    <filter id="blursales-monetizer">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="280" height="200" fill="url(#bgsales-monetizer)"/>

  <!-- Glow effect -->
  <ellipse cx="140" cy="90" rx="120" ry="96" fill="url(#glowsales-monetizer)"/>

  <!-- Pattern overlay -->
  <g opacity="0.15">
    
    <line x1="0" y1="0" x2="280" y2="0" stroke="#fb923c" stroke-width="0.6"/><line x1="0" y1="36" x2="280" y2="36" stroke="#fb923c" stroke-width="0.6"/><line x1="0" y1="72" x2="280" y2="72" stroke="#fb923c" stroke-width="0.6"/><line x1="0" y1="108" x2="280" y2="108" stroke="#fb923c" stroke-width="0.6"/><line x1="0" y1="144" x2="280" y2="144" stroke="#fb923c" stroke-width="0.6"/><line x1="0" y1="180" x2="280" y2="180" stroke="#fb923c" stroke-width="0.6"/><line x1="0" y1="0" x2="0" y2="200" stroke="#fb923c" stroke-width="0.6"/><line x1="36" y1="0" x2="36" y2="200" stroke="#fb923c" stroke-width="0.6"/><line x1="72" y1="0" x2="72" y2="200" stroke="#fb923c" stroke-width="0.6"/><line x1="108" y1="0" x2="108" y2="200" stroke="#fb923c" stroke-width="0.6"/><line x1="144" y1="0" x2="144" y2="200" stroke="#fb923c" stroke-width="0.6"/><line x1="180" y1="0" x2="180" y2="200" stroke="#fb923c" stroke-width="0.6"/><line x1="216" y1="0" x2="216" y2="200" stroke="#fb923c" stroke-width="0.6"/><line x1="252" y1="0" x2="252" y2="200" stroke="#fb923c" stroke-width="0.6"/>
    
  </g>

  <!-- Corner brackets -->
  <path d="M 24 12 L 12 12 L 12 24" stroke="#fb923c" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 256 12 L 268 12 L 268 24" stroke="#fb923c" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 24 188 L 12 188 L 12 176" stroke="#fb923c" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 256 188 L 268 188 L 268 176" stroke="#fb923c" stroke-width="2" fill="none" opacity="0.35"/>

  <!-- Center geometric shape -->
  
  <rect x="90" y="50" width="100" height="100" fill="none" stroke="#fb923c" stroke-width="1.5" opacity="0.25"/>
  

  <!-- Accent dots -->
  <circle cx="56" cy="50" r="3" fill="#fb923c" opacity="0.4"/>
  <circle cx="224" cy="130" r="2.5" fill="#fb923c" opacity="0.3"/>
  <circle cx="98" cy="140" r="2" fill="#fb923c" opacity="0.25"/>

  <!-- Title overlay at bottom -->
  <rect x="0" y="140" width="280" height="60" fill="url(#titleGradientsales-monetizer)"/>
  <linearGradient id="titleGradientsales-monetizer" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:rgba(0,0,0,0);stop-opacity:0" />
    <stop offset="100%" style="stop-color:rgba(0,0,0,0.75);stop-opacity:1" />
  </linearGradient>

  <text x="140" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.65)" text-anchor="middle">AI Sales Monetizer</text>
</svg>