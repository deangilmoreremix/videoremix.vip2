<?xml version="1.0" encoding="UTF-8"?>
<svg width="280" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgstoryboard" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </radialGradient>

    <radialGradient id="glowstoryboard" cx="50%" cy="45%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:0.25" />
      <stop offset="40%" style="stop-color:#f87171;stop-opacity:0.08" />
      <stop offset="70%" style="stop-color:#f87171;stop-opacity:0" />
    </radialGradient>

    <filter id="blurstoryboard">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="280" height="200" fill="url(#bgstoryboard)"/>

  <!-- Glow effect -->
  <ellipse cx="140" cy="90" rx="120" ry="96" fill="url(#glowstoryboard)"/>

  <!-- Pattern overlay -->
  <g opacity="0.15">
    
    
    <line x1="-200" y1="0" x2="0" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="-176" y1="0" x2="24" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="-152" y1="0" x2="48" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="-128" y1="0" x2="72" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="-104" y1="0" x2="96" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="-80" y1="0" x2="120" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="-56" y1="0" x2="144" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="-32" y1="0" x2="168" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="-8" y1="0" x2="192" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="16" y1="0" x2="216" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="40" y1="0" x2="240" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="64" y1="0" x2="264" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="88" y1="0" x2="288" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="112" y1="0" x2="312" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="136" y1="0" x2="336" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="160" y1="0" x2="360" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="184" y1="0" x2="384" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="208" y1="0" x2="408" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="232" y1="0" x2="432" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="256" y1="0" x2="456" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="280" y1="0" x2="480" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="304" y1="0" x2="504" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="328" y1="0" x2="528" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="352" y1="0" x2="552" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="376" y1="0" x2="576" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="400" y1="0" x2="600" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="424" y1="0" x2="624" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="448" y1="0" x2="648" y2="200" stroke="#f87171" stroke-width="0.6"/><line x1="472" y1="0" x2="672" y2="200" stroke="#f87171" stroke-width="0.6"/>
  </g>

  <!-- Corner brackets -->
  <path d="M 24 12 L 12 12 L 12 24" stroke="#f87171" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 256 12 L 268 12 L 268 24" stroke="#f87171" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 24 188 L 12 188 L 12 176" stroke="#f87171" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 256 188 L 268 188 L 268 176" stroke="#f87171" stroke-width="2" fill="none" opacity="0.35"/>

  <!-- Center geometric shape -->
  
  
  <rect x="100" y="60" width="80" height="80" fill="none" stroke="#f87171" stroke-width="1.5" opacity="0.25" transform="rotate(45 140 100)"/>

  <!-- Accent dots -->
  <circle cx="56" cy="50" r="3" fill="#f87171" opacity="0.4"/>
  <circle cx="224" cy="130" r="2.5" fill="#f87171" opacity="0.3"/>
  <circle cx="98" cy="140" r="2" fill="#f87171" opacity="0.25"/>

  <!-- Title overlay at bottom -->
  <rect x="0" y="140" width="280" height="60" fill="url(#titleGradientstoryboard)"/>
  <linearGradient id="titleGradientstoryboard" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:rgba(0,0,0,0);stop-opacity:0" />
    <stop offset="100%" style="stop-color:rgba(0,0,0,0.75);stop-opacity:1" />
  </linearGradient>

  <text x="140" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.65)" text-anchor="middle">Storyboard AI</text>
</svg>