[build]
  command = "npm install --include=dev --legacy-peer-deps && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Context-specific environment (production)
[context.production.environment]
  NODE_ENV = "production"

# Context-specific environment (deploy-preview)
[context.deploy-preview.environment]
  NODE_ENV = "development"

# Context-specific environment (branch-deploy)
[context.branch-deploy.environment]
  NODE_ENV = "development"

# Redirect old Netlify subdomain to custom domain
[[redirects]]
  from = "https://videoremix.netlify.app/*"
  to = "https://videoremix.vip/:splat"
  status = 301
  force = true

# API routes - handled by Netlify Functions
[[redirects]]
  from = "/api/personalizer/*"
  to = "/.netlify/functions/personalizer-api"
  status = 200
  force = true

# SPA fallback - all other routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
# Cache clear trigger - Force redeploy
