[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Personalization API endpoints - route to Netlify Functions
[[redirects]]
  from = "/api/personalizer/scan"
  to = "/.netlify/functions/personalization-scan-prospect"
  status = 200

[[redirects]]
  from = "/api/personalizer/generate"
  to = "/.netlify/functions/personalization-generate-personalization"
  status = 200

[[redirects]]
  from = "/api/personalizer/save"
  to = "/.netlify/functions/personalization-save-results"
  status = 200

[[redirects]]
  from = "/api/personalizer/media"
  to = "/.netlify/functions/personalization-generate-media"
  status = 200

[[redirects]]
  from = "/api/personalizer/job/create"
  to = "/.netlify/functions/personalization-scan-job-create"
  status = 200

[[redirects]]
  from = "/api/personalizer/job/:jobId/status"
  to = "/.netlify/functions/personalization-scan-job-status"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://bzxohkrxcwodllketcpz.supabase.co/:splat"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "https://bzxohkrxcwodllketcpz.supabase.co/auth/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.supabase.co https://*.videoremix.vip; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://*.videoremix.vip https://api.openai.com; frame-ancestors 'none';"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
  for = "/_redirects"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"