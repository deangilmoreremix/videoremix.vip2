apiVersion: 1

providers:
  - name: 'VideoRemix Monitoring'
    folder: 'VideoRemix Production'
    type: file
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

dashboardDefinitions:
  - name: openai-usage
    file: /var/lib/grafana/dashboards/openai-usage.json
  - name: app-health
    file: /var/lib/grafana/dashboards/app-health.json
  - name: system-resources
    file: /var/lib/grafana/dashboards/system-resources.json
  - name: error-tracking
    file: /var/lib/grafana/dashboards/error-tracking.json
