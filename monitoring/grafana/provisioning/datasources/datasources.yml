apiVersion: 1

datasources:
  # Prometheus
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"
    version: 1

  # Loki for logs
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      timeout: 60
      derivedFields:
        - datasourceUid: "prometheus"
          matcherRegex: "trace_id=(.*)"
          name: "TraceID"
          url: "$${__value.raw}"
    version: 1

  # PostgreSQL (Supabase)
  - name: Supabase
    type: postgres
    access: proxy
    url: ${VITE_SUPABASE_URL}:5432
    database: postgres
    user: postgres
    secure: true
    jsonData:
      sslmode: "require"
      postgresVersion: 1500
      timescaledb: false
    secureJsonData:
      password: "${POSTGRES_PASSWORD}"
    version: 1

  # CSV/JSON (for cost reports)
  - name: CostReports
    type: marcusolsson-csv-datasource
    url: /var/lib/grafana/dashboards/cost-reports
    access: proxy
    version: 1

  # Graphite (if needed)
  - name: Graphite
    type: graphite
    access: proxy
    url: http://graphite:8080
    version: 1
