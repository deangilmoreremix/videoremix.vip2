global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'videoremix-launch'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 5s

  - job_name: 'supabase-health'
    static_configs:
      - targets: ['api.supabase.co']
    scrape_interval: 30s
    metrics_path: '/health'

  - job_name: 'netlify-deploy'
    static_configs:
      - targets: ['videoremix.vip2']
    scrape_interval: 10s
    params:
      module: [http_2xx]