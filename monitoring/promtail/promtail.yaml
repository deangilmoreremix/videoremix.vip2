server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Application logs
  - job_name: videoremix-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: videoremix
          __path__: /app/logs/*.log
          service: videoremix-app
          environment: production

  # Frontend logs (from browser)
  - job_name: frontend-browser
    static_configs:
      - targets:
          - localhost
        labels:
          job: frontend
          __path__: /app/logs/browser-*.log
          service: frontend
          environment: production

  # API logs
  - job_name: api-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: api
          __path__: /app/logs/api-*.log
          service: api
          environment: production

  # System logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/**/*.log
          service: system
          environment: production

  # Docker container logs
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log
          service: docker
          environment: production

  # Edge Functions logs
  - job_name: edge-functions
    static_configs:
      - targets:
          - localhost
        labels:
          job: edge-functions
          __path__: /app/logs/edge-function-*.log
          service: edge-functions
          environment: production

  # PostgreSQL logs
  - job_name: postgres
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgres
          __path__: /var/log/postgresql/postgresql-*.log
          service: postgres
          environment: production

  # Nginx logs (if used)
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          __path__: /var/log/nginx/*.log
          service: nginx
          environment: production

# Pipeline stages for log processing
pipeline_stages:
  - json:
      expressions:
        level:
        message:
        timestamp:
        service:
        userId:
        requestId:
  - labels:
      level:
      service:
  - timestamp:
      source: timestamp
      format: "2006-01-02T15:04:05.000Z"
  - output:
      source: message
