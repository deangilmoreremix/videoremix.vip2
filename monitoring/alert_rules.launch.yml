groups:
  - name: revolutionary_launch_alerts
    rules:
      # Error Rate Alerts
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate detected ({{ $value }}%)"
          description: "Error rate is {{ $value }}% which is above the 5% threshold"

      # Performance Alerts
      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 3
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Slow response time detected"
          description: "95th percentile response time is {{ $value }}s"

      # User Engagement Alerts
      - alert: LowModalOpenRate
        expr: rate(modal_opens_total[5m]) / rate(page_views_total[5m]) < 0.1
        for: 10m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "Low modal open rate detected"
          description: "Modal open rate is {{ $value }}% which is below 10%"

      # System Health Alerts
      - alert: DatabaseConnectionIssues
        expr: up{job="supabase-health"} == 0
        for: 2m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Database connection issues"
          description: "Supabase health check is failing"

      # Launch Success Metrics
      - alert: LaunchSuccess
        expr: rate(modal_opens_total[1h]) > 100
        for: 5m
        labels:
          severity: info
          team: product
        annotations:
          summary: "🚀 Launch successful!"
          description: "Modal opens per hour: {{ $value }} - Launch metrics look great!"

      # Emergency Rollback Trigger
      - alert: EmergencyRollback
        expr: rate(http_requests_total{status="500"}[1m]) > 50
        for: 1m
        labels:
          severity: critical
          team: platform
          action: rollback
        annotations:
          summary: "🚨 EMERGENCY: High error rate - triggering rollback"
          description: "500 errors per minute: {{ $value }} - Automatic rollback initiated"