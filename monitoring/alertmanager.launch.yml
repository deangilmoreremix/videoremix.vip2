global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@videoremix.vip2'
  smtp_auth_username: 'alerts@videoremix.vip2'
  smtp_auth_password: 'your-app-password'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'team-notifications'
  routes:
    - match:
        severity: critical
      receiver: 'critical-notifications'
    - match:
        team: product
      receiver: 'product-team'
    - match:
        action: rollback
      receiver: 'emergency-rollback'

receivers:
  - name: 'team-notifications'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#launch-monitoring'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'
    email_configs:
      - to: 'team@videoremix.vip2'
        headers:
          Subject: '🚨 Launch Alert: {{ .GroupLabels.alertname }}'

  - name: 'critical-notifications'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#critical-alerts'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'
    email_configs:
      - to: 'oncall@videoremix.vip2'
        headers:
          Subject: '🚨 CRITICAL ALERT: {{ .GroupLabels.alertname }}'
    pagerduty_configs:
      - service_key: 'your-pagerduty-key'

  - name: 'product-team'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#product-metrics'
        title: '📊 {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'

  - name: 'emergency-rollback'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#emergency'
        title: '🚨 EMERGENCY ROLLBACK TRIGGERED'
        text: '{{ .CommonAnnotations.summary }}'
    email_configs:
      - to: 'emergency@videoremix.vip2'
        headers:
          Subject: '🚨 EMERGENCY: Automatic Rollback Initiated'