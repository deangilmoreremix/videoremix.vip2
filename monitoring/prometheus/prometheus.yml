global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'videoremix-monitoring'
    environment: 'production'

rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      scheme: http
      path_prefix: /

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # Loki
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Node Exporter - host metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor - container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # OpenAI API Exporter
  - job_name: 'openai-exporter'
    static_configs:
      - targets: ['openai-exporter:9464']
    scrape_interval: 30s
    scrape_timeout: 10s

  # Application Metrics Exporter
  - job_name: 'app-exporter'
    static_configs:
      - targets: ['app-exporter:9465']
    scrape_interval: 10s

  # Health Check Service
  - job_name: 'health-checker'
    static_configs:
      - targets: ['health-checker:9466']
    scrape_interval: 10s

  # Cost Tracker
  - job_name: 'cost-tracker'
    static_configs:
      - targets: ['cost-tracker:9467']
    scrape_interval: 60s

  # Supabase Database (via postgres_exporter if available)
  - job_name: 'supabase-postgres'
    static_configs:
      - targets: ['db:5432']
    # Requires postgres_exporter configuration

  # Custom application endpoints
  - job_name: 'videoremix-app'
    static_configs:
      - targets: ['frontend:5173']
    scrape_interval: 15s
    metrics_path: '/metrics'

  # Edge Functions (if metrics endpoint available)
  - job_name: 'edge-functions'
    static_configs:
      - targets: ['functions:8080']
    metrics_path: '/metrics'
